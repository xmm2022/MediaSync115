# NAS 部署用 compose 文件（仅 MediaSync115）
# 使用 Docker Hub 镜像，NAS 镜像管理可自动检测更新
services:
  postgres:
    image: postgres:16-alpine
    container_name: mediasync115-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mediasync115}
      POSTGRES_USER: ${POSTGRES_USER:-mediasync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediasync}
      TZ: Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mediasync115:
    image: wangsy1007/mediasync115:latest
    container_name: mediasync115
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5173:5173"
      - "9008:9008"
      - "8099:8099"
    environment:
      TZ: Asia/Shanghai
      STRM_HOST_IP: ${STRM_HOST_IP:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-}
      EMBY_PROXY_HOST: ${EMBY_PROXY_HOST:-host.docker.internal}
      EMBY_PROXY_PORT: ${EMBY_PROXY_PORT:-8096}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://mediasync:mediasync@postgres:5432/mediasync115}
    volumes:
      - ./data:/app/data
      - ${STRM_HOST_DIR:-./strm}:/app/strm
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5173/healthz', timeout=10)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

# 使用说明:
# 1. 将本文件上传到 NAS 的 docker 项目目录，重命名为 docker-compose.yml 或 compose.yaml
# 2. 在 NAS Docker 管理界面中，通过 "项目" 导入本文件部署
# 3. 若需一并部署盘搜，请改用 compose.nas.pansou.yaml

volumes:
  postgres-data:
