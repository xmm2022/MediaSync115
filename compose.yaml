services:
  postgres:
    image: postgres:16-alpine
    container_name: mediasync115-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mediasync115}
      POSTGRES_USER: ${POSTGRES_USER:-mediasync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediasync}
      TZ: Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mediasync115:
    build:
      context: .
      args:
        APP_BUILD_VERSION: "1.2.5"
        APP_BUILD_TAG: "1.2.5"
        APP_BUILD_GIT_SHA: "local"
        APP_BUILD_TIME: ""
    image: mediasync115:latest
    container_name: mediasync115
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5173:5173"
      - "9008:9008"
      - "8099:8099"
    environment:
      TZ: Asia/Shanghai
      # 避免宿主机 shell 注入不可达的 HTTP_PROXY 影响容器内 Telegram 等外网请求
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,host.docker.internal"
      no_proxy: "localhost,127.0.0.1,host.docker.internal"
      STRM_HOST_IP: ${STRM_HOST_IP:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-}
      EMBY_PROXY_HOST: ${EMBY_PROXY_HOST:-host.docker.internal}
      EMBY_PROXY_PORT: ${EMBY_PROXY_PORT:-8096}
      TMDB_LOCAL_DB_PATH: ${TMDB_LOCAL_DB_PATH:-data/tmdb_base.db}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://mediasync:mediasync@postgres:5432/mediasync115}
    volumes:
      - ./data:/app/data
      - ${STRM_HOST_DIR:-./strm}:/app/strm
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5173/healthz', timeout=10)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  postgres-data:
