user www-data;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    server {
        listen 5173;
        listen 9008;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location = /healthz {
            proxy_pass http://127.0.0.1:8000/health;
            proxy_http_version 1.1;
            proxy_connect_timeout 2s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;
            proxy_next_upstream off;
            proxy_intercept_errors on;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            error_page 502 503 504 = @health_unavailable;
        }

        location @health_unavailable {
            return 503;
        }

        location /api {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream off;
            proxy_intercept_errors off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Emby 代理端口：Emby Client 连接此端口，STRM 播放请求由 FastAPI 处理 302 跳转
    server {
        listen 8099;
        server_name _;

        # 使用 Docker 内置 DNS 在运行时解析，避免 nginx -t 时 DNS 不可用导致启动失败
        resolver 127.0.0.11 valid=30s ipv6=off;

        # 拦截 STRM 播放请求 → FastAPI → 302 跳转到 115 CDN
        location /api/strm/play/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # 其他所有 Emby 请求透明转发到真实 Emby 服务器
        location / {
            set $emby_backend "__EMBY_HOST__:__EMBY_PORT__";
            proxy_pass http://$emby_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
